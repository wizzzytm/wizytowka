name: CI/CD Pipeline

on:
  push:
    branches: [main, master]

env:
  IMAGE_TAG: ghcr.io/wizzzytm/wizytowka:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run CI Validation Checks
        run: python ci_check.py

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_TAG }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to AWS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Logowanie do rejestru z poziomu serwera AWS
            sudo docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

            # Zatrzymanie starego kontenera (jeśli istnieje)
            sudo docker stop wizytowka || true
            sudo docker rm wizytowka || true

            # Pobranie najnowszego obrazu
            sudo docker pull ${{ env.IMAGE_TAG }}

            # Uruchomienie aplikacji na porcie 80
            sudo docker run -d --name wizytowka -p 80:80 ${{ env.IMAGE_TAG }}

      - name: Powiadomienie na discord
        if: success()
        run: |
          curl -H  "Content-Type: application/json" \
          -d '{"content": "Wdrożenie zakończono sukcesem! **Nowa wersja aplikacji działa na AWS.**"}' \
          ${{ secrets.DC_WEBHOOK }}

      - name: Powiadomienie na discord (Błąd)
        if: failure()
        run: |
          curl -H  "Content-Type: application/json" \
          -d '{"content": "**BŁĄD WDROŻENIA AWS!** Coś poszło nie tak, proszę sprawdzić logi w GitHub Actions."}' \
          ${{ secrets.DC_WEBHOOK }}
