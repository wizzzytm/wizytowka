name: "Terraform pipeline"

on:
  push:
    paths:
      - "**.tf"
env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_VAR_duckdns_token: ${{secrets.DUCKDNS_TOKEN}}
  TF_VAR_duckdns_domain: "wizytowka-kolek"
jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Setup terraform"
        uses: hashicorp/setup-terraform@v4

      - name: "Run terraform"
        run: |
          terraform init
          terraform plan
          terraform apply -auto-approve

      - name: "Update DuckDNS domain"
        run: |
          NEW_IP=$(terraform output -raw instance_ip)
          echo "Nowy adres IP to: $NEW_IP"
          curl "https://www.duckdns.org/update?domains=${{env.TF_VAR_duckdns_domain}}&token=${{env.TF_VAR_duckdns_token}}&ip=$NEW_IP""

      - name: Powiadomienie na discord
        if: success()
        run: |
          curl -H  "Content-Type: application/json" \
          -d '{"content": "**SUKCES** - Terraform został poprawnie zainicjalizowany i wdrożony"}' \
          ${{ secrets.DC_WEBHOOK }}

      - name: Powiadomienie na discord (Błąd)
        if: failure()
        run: |
          curl -H  "Content-Type: application/json" \
          -d '{"content": "**BŁĄD** - Wdrożenie terraforma nie powiodło się."}' \
          ${{ secrets.DC_WEBHOOK }}
